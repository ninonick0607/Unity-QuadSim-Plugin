# Drone Configuration File - Crazyflie 2.1
name: "Crazyflie_Quad_V1"
body_mesh: "/QuadSimPlugin/Assets/Drone_Models/CrazyFlie/cf2_assembly.cf2_assembly"

physical_properties:
  # Genuine stock Crazyflie 2.1
  mass_kg: 0.029
  com_offset: {x: 0.0, y: 0.0, z: 0.0}

  inertia: {x: 0.00001657, y: 0.00001666, z: 0.00002926}

  # Center-to-motor radius from x/z offsets:
  # sqrt(0.031^2 + 0.031^2) = 0.04384
  arm_length: 0.04384

  # Start low for a tiny drone; tune/identify later
  linear_drag_coef: 0.02
  angular_drag_coef: 0.001

propulsion:
  prop_diameter: 0.045
  max_rpm: 24000
  max_thrust: 0.147
  thrust_coef: 0.183
  torque_coef: 0.0244
  
  propellers:
    - {id: 0, x:  0.031, y: 0.0, z:  0.031, dir: -1}  # FL
    - {id: 1, x:  0.031, y: 0.0, z: -0.031, dir:  1}  # FR
    - {id: 2, x: -0.031, y: 0.0, z:  0.031, dir:  1}  # BL
    - {id: 3, x: -0.031, y: 0.0, z: -0.031, dir: -1}  # BR

controller:
  # These PID gains are for the cascaded controller (QuadDroneController)
  # The Lee controller uses its own gains (Kx, Kv, KR, KOmega) which are hardcoded
  # to match Python: kx=4.0, kv=3.0, kR=0.8, komega=0.3
  
  position_gains:
    x: {p: 4.0, i: 0.0, d: 0.0}
    y: {p: 4.0, i: 0.0, d: 0.0}
    z: {p: 4.0, i: 0.0, d: 0.0}
  
  velocity_gains:
    x: {p: 3.0, i: 0.0, d: 0.0}
    y: {p: 3.0, i: 0.0, d: 0.0}
    z: {p: 3.0, i: 0.0, d: 0.0}
  
  attitude_gains:
    roll:  {p: 5.0, i: 0.0, d: 0.0}
    pitch: {p: 5.0, i: 0.0, d: 0.0}

  rate_gains:
    roll:  {p: 0.1, i: 0.0, d: 0.05}
    pitch: {p: 0.1, i: 0.0, d: 0.05}
    yaw:   {p: 0.1, i: 0.0, d: 0.0}

camera_parameters:
  Cam_Arm_Length: 0.05
  FOV: 100.0
  Cam_Pitch: -15.0
  Cam_Socket_Offset:
    x: -5.0
    y: 0.0
    z: 2.0

limits:
  max_velocity_xy: 2.0
  max_velocity_z: 1.0
  max_tilt_angle_deg: 30.0
  max_angular_rate_RP_deg: 200.0
  max_angular_rate_Yaw_deg: 200.0
  
  # Python: self.max_thrust = 0.6 N (total from all 4 motors)
  max_thrust_newtons: 0.6
  
  max_pid_output: 1.0
  altitude_threshold: 0.1
  min_altitude_local: 0.05
  
  # Python: self.waypoint_tolerance = 0.2 meters
  acceptable_distance: 0.2
  
  altitude_rate: 0.5
  yaw_rate: 90.0
  min_velocity_yaw: 0.1
